<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>A股风向标</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f5f5f7;color:#1d1d1f;font-size:15px;min-height:100vh;-webkit-font-smoothing:antialiased}
.hd{background:#fff;padding:14px 16px 12px;border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:100}
.hd h1{font-size:17px;font-weight:600;color:#000}
.hd .sub{font-size:12px;color:#86868b;margin-top:2px}
.bar{display:flex;gap:0;background:#fff;border-bottom:1px solid #e5e5ea;padding:0;position:sticky;top:52px;z-index:99}
.tab-btn{flex:1;padding:10px 4px;text-align:center;font-size:13px;color:#86868b;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
.tab-btn.on{color:#007aff;border-bottom-color:#007aff}
.cont{padding:0;max-width:100%}
.card{margin:12px 16px;background:#fff;border-radius:12px;overflow:hidden}
.card-hd{padding:12px 14px 8px;font-size:12px;color:#86868b;font-weight:500;border-bottom:1px solid #f0f0f5}
.card-hd span{float:right;font-size:12px;color:#007aff;font-weight:400}
.row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #f0f0f5;cursor:pointer;transition:background .1s}
.row:last-child{border-bottom:none}
.row:hover,.row:active{background:#f8f8fa}
.row.lit{background:#fff9f0}
.row.lid{background:#f0f9ff}
.rk{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#86868b;margin-right:10px;flex-shrink:0}
.rk.g{background:#fff3e0;color:#f57c00;font-weight:700}
.rk.t{background:#fff3e0;color:#e65100;font-weight:700}
.rk.b{background:#f0f0f5;color:#ff3b30}
.nm{flex:1;font-size:15px;font-weight:500;color:#000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cd{font-size:11px;color:#86868b;margin-top:2px}
.pr{flex-shrink:0;text-align:right;margin-left:8px}
.pr2{font-size:15px;font-weight:600;color:#000}
.cg{font-size:12px;font-weight:500;margin-top:2px}
.cg.up{color:#ff3b30}.cg.dn{color:#34c759}.cg.flat{color:#86868b}
.ex{font-size:10px;color:#86868b;margin-top:2px;text-align:right}
.tag{display:inline-block;padding:1px 5px;background:#f0f0f5;border-radius:4px;font-size:10px;color:#86868b;margin-top:2px}
.srch{padding:10px 16px;background:#fff;border-bottom:1px solid #e5e5ea}
.srch input{width:100%;padding:9px 14px;background:#f0f0f5;border:none;border-radius:10px;font-size:14px;color:#1d1d1f;outline:none}
.srch input::placeholder{color:#86868b}
.srch-res{position:absolute;top:calc(100%);left:0;right:0;background:#fff;border:1px solid #e5e5ea;border-radius:12px;overflow:hidden;display:none;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.srch-res.open{display:block}
.sri{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f0f5;cursor:pointer}
.sri:last-child{border-bottom:none}
.sri:active{background:#f8f8fa}
.sri .sn{font-weight:500;font-size:14px}
.sri .scd{font-size:11px;color:#86868b;margin-top:1px}
.sri .spr{text-align:right;flex-shrink:0}
.sri .spr .pr{font-weight:600;font-size:14px}
.sri .spr .cg{font-size:12px}
.fl{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
.fl::-webkit-scrollbar{display:none}
.flt{padding:6px 14px;background:#f0f0f5;border-radius:16px;font-size:12px;color:#1d1d1f;white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0}
.flt:active{background:#e5e5ea}
.flt.on{background:#007aff;color:#fff;font-weight:500}
.pg{display:flex;gap:6px;align-items:center;justify-content:center;padding:12px 16px;flex-wrap:wrap}
.pg button{background:#f0f0f5;border:none;border-radius:8px;padding:6px 14px;font-size:13px;color:#1d1d1f;cursor:pointer}
.pg button:active{background:#e5e5ea}
.pg button.on{background:#007aff;color:#fff}
.pg button:disabled{opacity:.3}
.pg .pginfo{font-size:11px;color:#86868b;padding:0 4px}
.hint{padding:32px 16px;text-align:center;color:#86868b;font-size:14px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:flex-end}
.modal.open{display:flex}
.sheet{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:40px}
.sh{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 16px 12px;border-bottom:1px solid #f0f0f5;position:sticky;top:0;background:#fff;z-index:2}
.sh .ti{flex:1}
.sh .nm{font-size:20px;font-weight:700;color:#000}
.sh .cd{font-size:12px;color:#86868b;margin-top:3px}
.sh .close{font-size:28px;color:#86868b;cursor:pointer;padding:0 4px;line-height:1;background:none;border:none}
.ph{padding:16px 16px 12px}
.ph .pr{font-size:36px;font-weight:700;color:#000;line-height:1}
.ph .cg{font-size:18px;font-weight:600;margin-top:4px}
.ph .cg.up{color:#ff3b30}.ph .cg.dn{color:#34c759}
.ph .ex{font-size:12px;color:#86868b;margin-top:4px}
.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#f0f0f5;margin:12px 16px;border-radius:12px;overflow:hidden}
.kpi .k{background:#fff;padding:10px 12px;text-align:center}
.kpi .kl{font-size:10px;color:#86868b}
.kpi .kv{font-size:16px;font-weight:600;color:#000;margin-top:3px}
.acts{padding:12px 16px;display:flex;gap:10px}
.act{flex:1;padding:11px;background:#f0f0f5;border-radius:10px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;color:#007aff}
.act:active{background:#e5e5ea}
.up{color:#ff3b30}.dn{color:#34c759}.flat{color:#86868b}

</style>
</head>
<body>

<div class="srch" style="position:relative">
<input id="inp" type="text" placeholder="搜索股票名称/代码..." oninput="onSearch()" autocomplete="off" maxlength="20">
<div class="srch-res" id="srch"></div>
</div>

<div class="bar">
<button class="tab-btn on" id="tab0" onclick="showTab(0)">📊 概况</button>
<button class="tab-btn" id="tab1" onclick="showTab(1)">🔥 排行</button>
<button class="tab-btn" id="tab2" onclick="showTab(2)">🏭 板块</button>
<button class="tab-btn" id="tab3" onclick="showTab(3)">📌 追踪</button>
</div>

<div id="content">
<div class="cont" id="pg0">
<div id="mk0"></div>
</div>
<div class="cont" id="pg1" style="display:none">
<div class="fl" id="rankFilters">
<button class="flt on" onclick="setSort(this,'rise')">涨幅</button>
<button class="flt" onclick="setSort(this,'fall')">跌幅</button>
<button class="flt" onclick="setSort(this,'volume')">成交额</button>
<button class="flt" onclick="setSort(this,'rise_days')">连涨</button>
</div>
<div id="rankRows"><div class="hint">加载中...</div></div>
<div class="pg" id="rankPg"></div>
</div>
<div class="cont" id="pg2" style="display:none">
<div id="secCards" class="fl" style="padding:10px 16px"></div>
<div id="secDetail"></div>
</div>
<div class="cont" id="pg3" style="display:none">
<div class="fl" id="trackFilters">
<button class="flt on" onclick="setTrack(this,0)">追踪中</button>
<button class="flt" onclick="setTrack(this,1)">已结束</button>
</div>
<div id="trackRows"><div class="hint">加载中...</div></div>
<div class="pg" id="trackPg"></div>
</div>
</div>

<div class="modal" id="detailModal" onclick="if(event.target===this)closeDetail()">
<div class="sheet" id="detailSheet"></div>
</div>


<script>
function $(id){return document.getElementById(id);}
function pct(v){if(v==null||v==='')return'-';v=parseFloat(v);return(v>0?'+':'')+v.toFixed(2)+'%';}
function pc(v){if(v==null||v===0)return'flat';return v>0?'up':'dn';}
function fmt(v,d){if(v==null)return'-';return parseFloat(v).toFixed(d!=null?d:2);}
function amt(v){if(v==null)return'-';v=parseFloat(v);if(v>=1e12)return(v/1e12).toFixed(2)+'万亿';if(v>=1e8)return(v/1e8).toFixed(2)+'亿';return v.toFixed(0);}
function api(url){return new Promise(function(resolve,reject){var x=new XMLHttpRequest();x.open('GET',url,true);x.setRequestHeader('Cache-Control','no-cache');x.timeout=12000;x.onload=function(){(x.status>=200&&x.status<300||x.status===304)?resolve(JSON.parse(x.responseText||'{}')):reject(new Error('HTTP'+x.status));};x.onerror=x.ontimeout=function(){reject(new Error('网络错误'));};x.send();});}
var _stT=null;function onSearch(){var v=$('inp').value.trim();clearTimeout(_stT);if(!v){$('srch').classList.remove('open');return;}_stT=setTimeout(function(){api('/api/search?q='+encodeURIComponent(v)+'&limit=12').then(function(d){var el=$('srch');if(d.code!==0||!d.data||!d.data.length){el.innerHTML='<div class="sri"><span style="color:#86868b;font-size:13px">无结果</span></div>';}else{el.innerHTML=d.data.map(function(x){var c=pc(x.pct_change);return'<div class="sri" onclick="openDetail(\''+x.ts_code+'\')"><div><div class="sn">'+(x.name||'')+'</div><div class="scd">'+x.ts_code+(x.industry?' · '+x.industry:'')+'</div></div><div class="spr"><div class="pr">'+fmt(x.close)+'</div><div class="cg '+c+'">'+pct(x.pct_change)+'</div></div></div>';}).join('');}el.classList.add('open');});},250);}
document.addEventListener('click',function(e){if(!e.target.closest('.srch'))$('srch').classList.remove('open');});
function showTab(i){document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('on');});$('tab'+i).classList.add('on');var pages=['pg0','pg1','pg2','pg3'];pages.forEach(function(p){$(p).style.display=p==='pg'+i?'block':'none';});if(i===0&&!window._m)loadMarket();if(i===1&&!window._r)loadRank(1);if(i===2&&!window._s)loadSectors();if(i===3&&!window._t)loadTrack(1);}
var _m=false;function loadMarket(){_m=true;api('/api/market/overview').then(function(d){if(d.code!==0)return;var m=d.data.data||d.data;var pctV=m.index_pct||0,c=pc(pctV);var em=Math.round((m.earn_ratio||0)/2),emC=em>=70?'#ff3b30':em>=50?'#f57c00':'#34c759';var html='<div class="card"><div class="card-hd">市场概况 <span>'+(m.trade_date||'')+'</span></div><div style="padding:4px 0"><div class="row"><div class="nm">上涨</div><div class="pr"><div class="pr2 up">'+(m.rise_count||0)+'</div><div class="cg up">'+((m.earn_ratio||0)/2).toFixed(0)+'%</div></div></div><div class="row"><div class="nm">下跌</div><div class="pr"><div class="pr2 dn">'+(m.fall_count||0)+'</div></div></div><div class="row" style="background:#fff9f0"><div class="nm">涨停</div><div class="pr"><div class="pr2" style="color:#e65100">'+(m.limit_up_count||0)+'</div><div class="cg up">TOP</div></div></div><div class="row"><div class="nm">上证</div><div class="pr"><div class="pr2">'+fmt(m.index_close,2)+'</div><div class="cg '+c+'">'+pct(pctV)+'</div></div></div></div>';$('mk0').innerHTML=html;loadPool();});}
function loadPool(){api('/api/strategy/pool?type=rise&top=20').then(function(d){var items=(d.data&&d.data.items)||[];var lu=items.filter(function(x){return x.pct_change>=9.8;}).slice(0,5);var tp=items.slice(0,8);var html='<div class="card"><div class="card-hd">🔥 涨停 <span>'+lu.length+'只</span></div>';if(lu.length){html+=lu.map(function(x,i){return'<div class="row lit" onclick="openDetail(\''+x.ts_code+'\')"><div class="rk g">'+(i+1)+'</div><div class="nm">'+x.name+'</div><div class="pr"><div class="pr2">'+fmt(x.close)+'</div><div class="cg up">+'+x.pct_change.toFixed(2)+'%</div></div></div>';}).join('');}else{html+='<div class="hint">今日无涨停</div>';}html+='</div>';html+='<div class="card"><div class="card-hd">强势股 <span>按涨幅</span></div>';html+=tp.map(function(x,i){var c=pc(x.pct_change);return'<div class="row" onclick="openDetail(\''+x.ts_code+'\')"><div class="rk">'+(i+1)+'</div><div class="nm">'+x.name+'<div class="cd">'+(x.industry||'')+'</div></div><div class="pr"><div class="pr2">'+fmt(x.close)+'</div><div class="cg '+c+'">'+pct(x.pct_change)+'</div></div></div>';}).join('');html+='</div>';$('mk0').innerHTML+=html;});}
var _sort='rise',_rankPage=1,_r=false;
function setSort(el,s){_sort=s;document.querySelectorAll('.flt').forEach(function(b){b.classList.remove('on');});el.classList.add('on');loadRank(1);}
function loadRank(page){_rankPage=page;_r=true;var el=$('rankRows');el.innerHTML='<div class="hint">加载中...</div>';api('/api/strategy/pool?type='+_sort+'&top=20').then(function(d){if(d.code!==0){el.innerHTML='<div class="hint">加载失败</div>';return;}var items=(d.data&&d.data.items)||[],total=items.length;el.innerHTML=items.length?items.map(function(x,i){var rn=(page-1)*20+i+1,c=pc(x.pct_change);return'<div class="row" onclick="openDetail(\''+x.ts_code+'\')"><div class="rk">'+rn+'</div><div class="nm">'+(x.name||'')+'<div class="cd">'+(x.industry||'')+'</div></div><div class="pr"><div class="pr2">'+fmt(x.close)+'</div><div class="cg '+c+'">'+pct(x.pct_change)+'</div></div></div>';}).join(''):'<div class="hint">暂无数据</div>';var pg=$('rankPg');if(!pg)return;pg.innerHTML=total<=20?'':'<span class="pginfo">'+total+'条</span>';}).catch(function(){el.innerHTML='<div class="hint">网络错误</div>';});}
var _s=false;function loadSectors(){_s=true;api('/api/strategy/pool?type=rise&top=50').then(function(d){var items=(d.data&&d.data.items)||[];var map={};items.forEach(function(x){if(x.industry){if(!map[x.industry])map[x.industry]={c:0,r:0};map[x.industry].c++;if(x.pct_change>0)map[x.industry].r++;}});var secs=Object.keys(map).map(function(k){return{k:k,cnt:map[k].c,rise:map[k].r};}).sort(function(a,b){return b.rise/b.cnt-a.rise/a.cnt;}).slice(0,15);$('secCards').innerHTML=secs.map(function(s){var r=Math.round(s.rise/s.cnt*100);return'<button class="flt" onclick="openSector(\''+s.k.replace(/'/g,"\\'")+'\')">'+s.k+' '+r+'%</button>';}).join('');$('secDetail').innerHTML='<div class="hint" style="margin-top:20px">点击上方板块查看</div>';});}
function openSector(ind){$('secDetail').innerHTML='<div class="hint" style="margin-top:20px">加载中...</div>';api('/api/strategy/pool?type=rise&top=50').then(function(d){var items=(d.data&&d.data.items||[]).filter(function(x){return x.industry===ind;}).slice(0,15);var html='<div class="card"><div class="card-hd">🏭 '+ind+' <span>'+items.length+'只</span></div>';html+=items.map(function(x,i){var c=pc(x.pct_change);return'<div class="row" onclick="openDetail(\''+x.ts_code+'\')"><div class="rk">'+(i+1)+'</div><div class="nm">'+x.name+'<div class="cd">'+x.ts_code+'</div></div><div class="pr"><div class="pr2">'+fmt(x.close)+'</div><div class="cg '+c+'">'+pct(x.pct_change)+'</div></div></div>';}).join('');html+='</div>';$('secDetail').innerHTML=html;});}
var _t=false,_trackStatus=0;function setTrack(el,s){_trackStatus=parseInt(s);document.querySelectorAll('#trackFilters .flt').forEach(function(b){b.classList.remove('on');});el.classList.add('on');loadTrack(1);}
function loadTrack(page){_t=true;var el=$('trackRows');el.innerHTML='<div class="hint">加载中...</div>';api('/api/strategy/golden_cross/track?page='+page+'&page_size=30').then(function(d){if(d.code!==0){el.innerHTML='<div class="hint">加载失败</div>';return;}var all=(d.data&&d.data.items||[]).filter(function(x){return x.status===_trackStatus;}),total=all.length,start=(page-1)*30,pageItems=all.slice(start,start+30);el.innerHTML=pageItems.length?pageItems.map(function(x){var st=_trackStatus===0?'追踪':'已结束',c=pc(x.rt_pct);return'<div class="row" onclick="openDetail(\''+x.ts_code+'\')"><div class="rk">'+st+'</div><div class="nm">'+x.name+'<div class="cd">'+x.ts_code+' · '+x.trade_date+'</div></div><div class="pr"><div class="pr2">'+fmt(x.close)+'</div><div class="cg '+c+'">'+pct(x.rt_pct)+'</div></div></div>';}).join(''):'<div class="hint">暂无追踪记录</div>';var pg=$('trackPg');if(!pg)return;pg.innerHTML=total<=30?'':'<span class="pginfo">'+total+'条</span>';});}
function openDetail(code){var el=$('detailSheet');el.innerHTML='<div class="hint">加载中...</div>';$('detailModal').classList.add('open');api('/api/stock/info?ts_code='+encodeURIComponent(code)).then(function(d){if(d.code!==0){el.innerHTML='<div class="hint">加载失败</div>';return;}var x=d.data||{};var pctV=parseFloat(x.pct_change)||0,c=pc(pctV);var html='<div class="sh"><div class="ti"><div class="nm">'+(x.name||code)+'</div><div class="cd">'+code+(x.industry?' · '+x.industry:'')+'</div></div><button class="close" onclick="closeDetail()">×</button></div>';html+='<div class="ph"><div class="pr">'+fmt(x.latest_price)+'</div><div class="cg '+c+'">'+pct(pctV)+'</div><div class="ex">更新时间: '+(x.latest_date||'')+'</div></div>';html+='<div class="kpi"><div class="k"><div class="kl">行业</div><div class="kv">'+(x.industry||'-')+'</div></div><div class="k"><div class="kl">细分</div><div class="kv">'+(x.sub_industry||'-')+'</div></div><div class="k"><div class="kl">市场</div><div class="kv">'+(x.market||'-')+'</div></div></div>';html+='<div class="acts"><div class="act" onclick="closeDetail()">关闭</div></div>';el.innerHTML=html;}).catch(function(){el.innerHTML='<div class="hint">网络错误</div>';});}
function closeDetail(){$('detailModal').classList.remove('open');}
showTab(0);

</script>
</body>
</html>
