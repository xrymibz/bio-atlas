<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>我见过的 - 脑图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0b1d10;color:white}
.hd{background:linear-gradient(135deg,#1b4332,#0d2818);color:white;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;position:fixed;top:0;left:0;right:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,0.6)}
.hd h1{font-size:15px;font-weight:600}
.bk{padding:7px 14px;background:rgba(255,255,255,0.12);color:white;border:none;border-radius:20px;font-size:13px;text-decoration:none}
#wrap{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:auto}
#canvas{min-width:2000px;min-height:100vh;position:relative;padding:30px 20px 120px}
svg#lines{position:absolute;top:0;left:0;pointer-events:none;z-index:1;overflow:visible}

/* Node */
.nd{position:absolute;display:flex;flex-direction:column;align-items:center}
.nd-in{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.nd-in:hover{filter:brightness(1.2)}
.ct{padding:1px 7px;background:rgba(255,255,255,0.22);border-radius:10px;font-size:10px;font-weight:700}
.ar{font-size:9px;opacity:0.5;margin-left:3px}

/* Level colors */
.nd-root .nd-in{background:linear-gradient(135deg,#1565c0,#0d47a1);color:white;padding:9px 20px;font-size:15px;border-radius:28px;box-shadow:0 4px 18px rgba(21,101,192,0.5)}
.nd-root.nd-plant .nd-in{background:linear-gradient(135deg,#2e7d32,#1b5e20);box-shadow:0 4px 18px rgba(46,125,50,0.5)}
.nd-1 .nd-in{background:#152238;color:#90caf9;border-radius:15px;padding:5px 12px;font-size:11px;border:1px solid #1e3a5f}
.nd-2 .nd-in{background:#2a1800;color:#ffcc80;border-radius:11px;padding:4px 10px;font-size:11px;border:1px solid #5d3a00}
.nd-3 .nd-in{background:#001f0f;color:#a5d6a7;border-radius:10px;padding:4px 10px;font-size:11px;border:1px solid #2e7d32}
.nd-4 .nd-in{background:#001b24;color:#80cbc4;border-radius:10px;padding:4px 10px;font-size:11px;border:1px solid #00695c}
.nd-leaf .nd-in{background:#111;color:#bbb;border-radius:18px;padding:3px 10px;font-size:11px;border:1px solid #2a2a2a;box-shadow:0 2px 5px rgba(0,0,0,0.4)}
.nd-leaf .nd-in:hover{border-color:#4caf50;color:#fff}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-on{background:#4caf50}
.dot-off{background:#444}
.tm{font-size:10px;color:#555;margin-left:2px}
.ln{stroke-linecap:round;fill:none}
</style>
</head>
<body>
<div class="hd"><h1>🧠 我见过的</h1><div style="display:flex;gap:8px"><a href="/my-sightings" class="bk">📋 列表</a><a href="/" class="bk">🏠 首页</a></div></div>
<div id="wrap"><div id="canvas"><svg id="lines"></svg></div></div>

{%if tree%}
<script>
var tree = {{tree_json | safe}};
var sjs  = {{sjs | safe}};

// ── Constants ──
var LX   = 200;  // horizontal gap between levels
var PAD_X = 28;  // min gap between sibling nodes
var PAD_Y = 20;  // min gap between sibling subtrees vertically
var LEAF_W = 130; // width per species leaf
var LH    = 34;  // line height / node height unit

var canvas = document.getElementById('canvas');
var svg    = document.getElementById('lines');

// ── Build flat list of nodes with unique IDs ──
var nextId = 1;
var nodesMap = {};
function buildNodes(n, pid, depth) {
  var node = {
    id: nextId++,
    pid: pid,
    depth: depth,
    name: n.name,
    type: n.type || '',
    icon: n.icon || '',
    count: n.count,
    children: [],
    rows: n.rows || [],
    collapsed: false,
    x: 0, y: 0, w: 0, h: 0
  };
  nodesMap[node.id] = node;
  if (n.children) {
    for (var i = 0; i < n.children.length; i++) {
      var child = buildNodes(n.children[i], node.id, depth + 1);
      node.children.push(child);
    }
  }
  return node;
}

// ── Compute subtree width ──
function subW(n) {
  if (n.rows && n.rows.length) {
    return Math.max(n.rows.length * LEAF_W + Math.max(0, n.rows.length - 1) * PAD_X, PAD_X);
  }
  // Genus node with sighting children: width = total horizontal span of leaves
  if (n.type === 'genus') {
    return Math.max(n.children.length * LEAF_W + Math.max(0, n.children.length - 1) * PAD_X, PAD_X);
  }
  // Family node with genus children
  if (n.type === 'family') {
    var w = 0;
    for (var i = 0; i < n.children.length; i++) {
      w += subW(n.children[i]);
      if (i > 0) w += PAD_X;
    }
    return Math.max(w, PAD_X);
  }
  if (!n.children || n.children.length === 0) return PAD_X;
  var w = 0;
  for (var i = 0; i < n.children.length; i++) {
    w += subW(n.children[i]);
    if (i > 0) w += PAD_X;
  }
  return Math.max(w, PAD_X);
}

// ── Layout pass: assign x, y, w, h to each node ──
function layout(n, yCenter) {
  var xc = 80 + n.depth * LX;
  var nodeH = 36;
  var nodeW = 100;

  n.y = yCenter;
  n.x = xc;

  // Sighting leaf: compute size and return immediately (no children to recurse)
  if (n.type === 'sighting') {
    n.w = LEAF_W;
    n.h = LH;
    return LH;
  }

  if (!n.children || n.children.length === 0) {
    n.w = nodeW;
    n.h = nodeH;
    return nodeH;
  }

  // Genus node: children are sighting leaves, laid out horizontally
  if (n.type === 'genus') {
    var totalW = n.children.length * LEAF_W + Math.max(0, n.children.length - 1) * PAD_X;
    for (var i = 0; i < n.children.length; i++) {
      n.children[i].x = xc + LX + i * (LEAF_W + PAD_X) - totalW / 2 + LEAF_W / 2;
      n.children[i].y = yCenter;
    }
    n.w = nodeW;
    n.h = nodeH;
    return nodeH;
  }

  // Family node: children are genus nodes, compute total height from genus children
  if (n.type === 'family') {
    var childY = yCenter - (subW(n) / 2);
    for (var i = 0; i < n.children.length; i++) {
      var cw = subW(n.children[i]);
      var cy = childY + cw / 2;
      layout(n.children[i], cy);
      childY += cw + PAD_X;
    }
    n.w = nodeW;
    n.h = nodeH;
    return subW(n);
  }

  var childY = yCenter - (subW(n) / 2);
  for (var i = 0; i < n.children.length; i++) {
    var cw = subW(n.children[i]);
    var cy = childY + cw / 2;
    layout(n.children[i], cy);
    childY += cw + PAD_X;
  }

  n.w = nodeW;
  n.h = nodeH;
  return subW(n);
}

// ── Build flat list ──
var flatNodes = [];
function flatten(n) {
  flatNodes.push(n);
  if (n.children) n.children.forEach(flatten);
}
var roots = tree.map(function(k) { return buildNodes(k, null, 0); });
roots.forEach(function(r) { flatten(r); });

// ── Layout each kingdom ──
var yPos = 80;
for (var ki = 0; ki < roots.length; ki++) {
  var h = layout(roots[ki], yPos + subW(roots[ki]) / 2);
  yPos += subW(roots[ki]) + PAD_Y * 3;
}

// ── Render nodes to DOM ──
var nodeEls = {};
function renderNode(n) {
  var el = document.createElement('div');
  var cls = n.depth === 0 ? 'nd nd-root' : 'nd nd-' + Math.min(n.depth, 4);
  if (n.depth === 0 && n.name.indexOf('植物') >= 0) cls += ' nd-plant';
  el.className = cls;
  el.setAttribute('id', 'n' + n.id);

  var hasKids = (n.children && n.children.length) || (n.rows && n.rows.length);
  var inEl = document.createElement('div');
  inEl.className = 'nd-in';
  inEl.innerHTML = '<span>' + n.icon + ' ' + n.name + '</span><span class="ct">' + n.count + '</span>' +
    (hasKids ? '<span class="ar">▶</span>' : '');
  el.appendChild(inEl);
  canvas.appendChild(el);

  var rect = el.getBoundingClientRect();
  n.w = rect.width;
  n.h = rect.height;
  el.style.left = (n.x - n.w / 2) + 'px';
  el.style.top  = (n.y - n.h / 2) + 'px';
  nodeEls[n.id] = el;

  if (n.children) {
    for (var i = 0; i < n.children.length; i++) {
      var ch = n.children[i];
      if (ch.type === 'sighting') {
        // Sighting leaf: render directly as a leaf node
        var spEl = document.createElement('div');
        spEl.className = 'nd nd-leaf';
        spEl.setAttribute('id', 'sp' + ch.sid);
        var dot = ch.photo ? 'dot-on' : 'dot-off';
        var ico = ch.org_type === 'plant' ? '🌱' : '🐾';
        spEl.innerHTML = '<div class="nd-in" onclick="showDet(' + ch.sid + ')">' +
          '<span class="dot ' + dot + '"></span>' +
          '<span>' + ico + ' ' + ch.name + '</span>' +
          '<span class="tm">' + ch.seen_at + '</span></div>';
        canvas.appendChild(spEl);
        var rw = spEl.getBoundingClientRect().width;
        spEl.style.left = (ch.x - rw / 2) + 'px';
        spEl.style.top  = (ch.y - 17) + 'px';
      } else if (ch.type === 'genus') {
        // Genus node: render as internal node with count badge, then render sighting children
        var el2 = document.createElement('div');
        el2.className = 'nd nd-' + Math.min(n.depth + 1, 4);
        el2.setAttribute('id', 'n' + ch.id);
        var hasKids2 = ch.children && ch.children.length;
        el2.innerHTML = '<div class="nd-in"><span>' + ch.name + '</span><span class="ct">' + ch.count + '</span>' +
          (hasKids2 ? '<span class="ar">▶</span>' : '') + '</div>';
        canvas.appendChild(el2);
        var r2 = el2.getBoundingClientRect();
        ch.w = r2.width; ch.h = r2.height;
        el2.style.left = (ch.x - r2.width / 2) + 'px';
        el2.style.top  = (ch.y - r2.height / 2) + 'px';
        // Render sighting children inside genus
        for (var j = 0; j < ch.children.length; j++) {
          var sp = ch.children[j];
          var spEl = document.createElement('div');
          spEl.className = 'nd nd-leaf';
          spEl.setAttribute('id', 'sp' + sp.sid);
          var dot = sp.photo ? 'dot-on' : 'dot-off';
          var ico = sp.org_type === 'plant' ? '🌱' : '🐾';
          spEl.innerHTML = '<div class="nd-in" onclick="showDet(' + sp.sid + ')">' +
            '<span class="dot ' + dot + '"></span>' +
            '<span>' + ico + ' ' + sp.name + '</span>' +
            '<span class="tm">' + (sp.seen_at || '') + '</span></div>';
          canvas.appendChild(spEl);
          spEl.style.left = (sp.x - LEAF_W / 2) + 'px';
          spEl.style.top  = (sp.y - 17) + 'px';
        }
        return;  // <-- genus node already rendered, don't recurse into its children
      } else {
        renderNode(ch);
      }
    }
  }
}
roots.forEach(renderNode);

// Sighting leaf nodes rendered inside renderNode

// ── Draw lines ──
var lineColors = ['#1565c0','#1e88e5','#43a047','#f57c00','#00acc1','#78909c'];

function drawLine(n) {
  if (n.children) {
    for (var i = 0; i < n.children.length; i++) {
      var ch = n.children[i];
      var x1 = n.x + n.w / 2;
      var y1 = n.y;
      // Genus children: draw horizontal branch to each sighting
      if (ch.type === 'genus') {
        var sx = ch.x;
        var yTop = ch.y - LH / 2;
        var yBot = ch.y + LH / 2;
        // Vertical spine
        var sp0 = document.createElementNS('http://www.w3.org/2000/svg','line');
        sp0.setAttribute('x1', sx); sp0.setAttribute('y1', yTop);
        sp0.setAttribute('x2', sx); sp0.setAttribute('y2', yBot);
        sp0.setAttribute('stroke', lineColors[Math.min(n.depth + 1, lineColors.length - 1)]);
        sp0.setAttribute('stroke-width', '1.3');
        sp0.setAttribute('opacity', '0.45');
        sp0.setAttribute('class', 'ln');
        svg.appendChild(sp0);
        // Horizontal branch from parent to genus
        var pg = document.createElementNS('http://www.w3.org/2000/svg','path');
        pg.setAttribute('d', 'M' + x1 + ',' + y1 + ' C' + sx + ',' + y1 + ' ' + sx + ',' + yBot + ' ' + sx + ',' + yBot);
        pg.setAttribute('stroke', lineColors[Math.min(n.depth, lineColors.length - 1)]);
        pg.setAttribute('stroke-width', '1.6');
        pg.setAttribute('opacity', '0.55');
        pg.setAttribute('class', 'ln');
        svg.appendChild(pg);
        // Draw genus → sighting lines
        for (var j = 0; j < ch.children.length; j++) {
          var sp = ch.children[j];
          var x2 = sp.x - LEAF_W / 2;
          var y2 = sp.y;
          var pg2 = document.createElementNS('http://www.w3.org/2000/svg','path');
          pg2.setAttribute('d', 'M' + sx + ',' + yBot + ' C' + sx + ',' + y2 + ' ' + sx + ',' + y2 + ' ' + x2 + ',' + y2);
          pg2.setAttribute('stroke', lineColors[Math.min(n.depth + 2, lineColors.length - 1)]);
          pg2.setAttribute('stroke-width', '1.3');
          pg2.setAttribute('opacity', '0.45');
          pg2.setAttribute('class', 'ln');
          svg.appendChild(pg2);
        }
      } else {
        // Internal node: normal curved connector
        var x2 = ch.x - ch.w / 2;
        var y2 = ch.y;
        var mx = x1 + (x2 - x1) * 0.5;
        var p = document.createElementNS('http://www.w3.org/2000/svg','path');
        p.setAttribute('d', 'M' + x1 + ',' + y1 + ' C' + mx + ',' + y1 + ' ' + mx + ',' + y2 + ' ' + x2 + ',' + y2);
        p.setAttribute('stroke', lineColors[Math.min(n.depth, lineColors.length - 1)]);
        p.setAttribute('stroke-width', n.depth === 0 ? '2.2' : '1.6');
        p.setAttribute('opacity', '0.55');
        p.setAttribute('class', 'ln');
        svg.appendChild(p);
        drawLine(ch);
      }
    }
  }
}

// ── Toggle collapse / expand ──
// el: the .nd element that was clicked
function t(el) {
  // el is .nd-in, need to get parent .nd to find the node id
  var ndEl = el.parentElement;
  if (!ndEl || !ndEl.className.includes('nd')) return;
  var nodeId = parseInt(ndEl.id.replace('n', ''));
  var node = nodesMap[nodeId];
  if (!node) return;

  node.collapsed = !node.collapsed;

  // Update arrow
  var arrow = el.querySelector('.ar');
  if (arrow) arrow.textContent = node.collapsed ? '▶' : '▼';

  // Get all descendant node IDs
  function getDescendantIds(n) {
    var ids = [];
    if (n.children) {
      for (var i = 0; i < n.children.length; i++) {
        ids.push(n.children[i].id);
        ids = ids.concat(getDescendantIds(n.children[i]));
      }
    }
    return ids;
  }

  var descendantIds = getDescendantIds(node);

  // Also hide the line connecting TO this node (data-pid = parent.id)
  var allLineIds = descendantIds.concat([nodeId]);
  if (node.pid) allLineIds.push(node.pid);

  // Hide/show descendant node DOM elements
  for (var i = 0; i < descendantIds.length; i++) {
    var dn = nodesMap[descendantIds[i]];
    if (!dn) continue;
    var del = document.getElementById('n' + dn.id);
    if (del) {
      del.style.display = node.collapsed ? 'none' : '';
    }
    // Also hide leaf elements
    if (dn.type === 'sighting') {
      var sle = document.getElementById('sp' + dn.sid);
      if (sle) sle.style.display = node.collapsed ? 'none' : '';
    }
  }

  // Hide/show all SVG lines belonging to this node or any descendant
  var allLineIds = descendantIds.concat([nodeId]);
  var lines = svg.querySelectorAll('.ln');
  for (var i = 0; i < lines.length; i++) {
    var pid = parseInt(lines[i].getAttribute('data-pid'));
    if (allLineIds.indexOf(pid) >= 0) {
      lines[i].style.display = node.collapsed ? 'none' : '';
    }
  }
}

function resizeSvg() {
  svg.style.width  = Math.max(canvas.getBoundingClientRect().width,  canvas.scrollWidth)  + 'px';
  svg.style.height = Math.max(canvas.getBoundingClientRect().height, canvas.scrollHeight) + 'px';
}

roots.forEach(drawLine);
resizeSvg();
window.addEventListener('resize', resizeSvg);

// ── Collapse / Expand ──
document.addEventListener('click', function(e) {
  var inEl = e.target.closest('.nd-in');
  if (!inEl || !inEl.querySelector('.ar')) return;
  var el = inEl.closest('.nd');
  var nid = parseInt(el.id.replace('n', ''));
  var node = flatNodes.find(function(n) { return n.id === nid; });
  if (!node) return;

  var collapsed = inEl.classList.toggle('collapsed');
  inEl.querySelector('.ar').textContent = collapsed ? '▷' : '▶';

  function hideDescendants(n) {
    if (n.children) n.children.forEach(function(ch) {
      var chel = document.getElementById('n' + ch.id);
      if (chel) chel.style.display = collapsed ? 'none' : 'flex';
      hideDescendants(ch);
    });
    if (n.rows) n.rows.forEach(function(sp) {
      var spel = document.getElementById('sp' + sp.sid);
      if (spel) spel.style.display = collapsed ? 'none' : 'flex';
    });
  }
  hideDescendants(node);

  // Redraw lines
  svg.innerHTML = '';
  roots.forEach(drawLine);
  resizeSvg();
});

// ── Detail popup ──
function showDet(sid) {
  var x = sjs[sid]; if (!x) return;
  var ico = x.org_type === 'plant' ? '🌱' : '🐾';
  var ov = document.createElement('div');
  ov.style = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;';
  ov.onclick = function(e) { if (e.target === ov) ov.remove(); };
  ov.innerHTML = '<div style="background:white;border-radius:16px;padding:24px;width:100%;max-width:420px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#222">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
      '<div style="font-size:18px;font-weight:600">'+ico+' '+x.name_cn+'</div>' +
      '<span onclick="this.closest(\'div\').parentElement.remove()" style="font-size:28px;color:#999;cursor:pointer;line-height:1">×</span>' +
    '</div>' +
    (x.scientific_name ? '<div style="font-size:13px;color:#888;font-style:italic;margin-bottom:10px">'+x.scientific_name+'</div>' : '') +
    '<div style="font-size:12px;color:#666;margin-bottom:10px">📅 '+x.seen_at+'</div>' +
    (x.note ? '<div style="background:#f8f9fa;border-radius:8px;padding:12px;font-size:14px;color:#444;margin-bottom:10px;line-height:1.5">'+x.note+'</div>' : '') +
    '<div style="display:flex;gap:10px">' +
      '<button onclick="delS('+sid+')" style="flex:1;padding:10px;border:1px solid #ffcdd2;border-radius:8px;background:#fff5f5;color:#c62828;font-size:13px;cursor:pointer">🗑️ 删除</button>' +
      '<button onclick="this.closest(\'div\').parentElement.remove()" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:white;font-size:13px;cursor:pointer">关闭</button>' +
    '</div>' +
  '</div>';
  document.body.appendChild(ov);
}

function delS(id) {
  if (!confirm('删除这条记录？')) return;
  fetch('/api/sighting/'+id,{method:'DELETE'}).then(function(r){return r.json();}).then(function(d){
    if (d.ok) location.reload(); else alert('失败');
  });
}
</script>
{%else%}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 52px);gap:14px">
<div style="font-size:60px;opacity:0.2">🌿</div>
<div style="font-size:16px;opacity:0.4">还没有见过记录</div>
<div style="font-size:13px;opacity:0.25;margin-top:4px">去图鉴首页标记吧～</div>
<a href="/" style="margin-top:16px;padding:10px 24px;background:#2d6a4f;color:white;border-radius:20px;text-decoration:none;font-size:14px">去图鉴</a>
</div>
{%endif%}
</body></html>
